# .github/workflows/ci.yml
# Coverage and E2E gates run on every push and PR to main.
# Threshold misses hard-fail; HTML/test artifacts are uploaded for triage.
# Phase 13 applies and proves required-check branch protection on main.
name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend-coverage:
    name: Backend Coverage
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned Rust toolchain (--branch is unstable)
        run: |
          PINNED_RUST="$(sed -n 's/^channel = "\(.*\)"/\1/p' ../rust-toolchain.toml)"
          test -n "$PINNED_RUST"
          rustup toolchain install "$PINNED_RUST" --profile minimal \
            --component llvm-tools-preview --component rustfmt --component clippy
          rustup show active-toolchain | grep -F "$PINNED_RUST"
          rustc --version
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov@0.8.5
      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: Run coverage with project-wide line gate
        run: |
          cargo llvm-cov nextest \
            --branch --all-features \
            --ignore-filename-regex '(main\.rs|tests/common/.*)' \
            --fail-under-lines 90 \
            --lcov --output-path lcov.info
      - name: Enforce branch + per-file thresholds
        run: bash ../scripts/enforce-coverage-floor.sh lcov.info 85 70 60
      - name: Generate HTML report
        if: always()
        run: cargo llvm-cov --branch --all-features --no-clean --html
      - name: Upload HTML artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-html
          path: backend/target/llvm-cov/html
          retention-days: 14

  frontend-coverage:
    name: Frontend Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Validate CI file references
        run: make -C "$GITHUB_WORKSPACE" test-ci-config
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Pin npm
        run: npm install --global npm@11.12.1
      - run: npm ci
      - name: Run Vitest with coverage (thresholds enforced via vitest.config.ts)
        run: npx vitest run --coverage
      - name: Upload HTML artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-html
          path: frontend/coverage
          retention-days: 14

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    env:
      TZ: America/Caracas
    steps:
      - uses: actions/checkout@v4
      - name: Validate CI file references
        run: make -C "$GITHUB_WORKSPACE" test-ci-config
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Pin npm
        run: npm install --global npm@11.12.1
      - name: Install pinned Rust toolchain
        run: |
          PINNED_RUST="$(sed -n 's/^channel = "\(.*\)"/\1/p' rust-toolchain.toml)"
          test -n "$PINNED_RUST"
          rustup toolchain install "$PINNED_RUST" --profile minimal \
            --component llvm-tools-preview --component rustfmt --component clippy
          rustup show active-toolchain | grep -F "$PINNED_RUST"
          rustc --version
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: Install npm deps
        working-directory: frontend
        run: npm ci
      - name: Build frontend
        working-directory: frontend
        run: npm run build
      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Build backend release binaries (cronometrix + mock_hikvision + seed_e2e)
        working-directory: backend
        run: |
          cargo build --release --bin cronometrix
          cargo build --release --bin mock_hikvision --features mock-hikvision
          cargo build --release --bin seed_e2e --features seed-e2e
      - name: Run Playwright tests (full E2E suite)
        working-directory: frontend
        env:
          CI: 'true'
          CRONOMETRIX_E2E_RELEASE: 'true'
          CRONOMETRIX_E2E_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
          TZ: America/Caracas
        run: npx playwright test
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: frontend/playwright-report
          retention-days: 14
      - name: Upload test results (videos / traces / screenshots)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: frontend/test-results
          retention-days: 14
