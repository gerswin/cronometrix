worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    resolver 127.0.0.11 valid=30s ipv6=off;

    map $http_x_forwarded_proto $forwarded_proto {
        default $http_x_forwarded_proto;
        "" $scheme;
    }

    upstream cronometrix_api {
        zone cronometrix_api 64k;
        server api:3001 resolve;
        keepalive 16;
    }

    upstream cronometrix_web {
        zone cronometrix_web 64k;
        server web:3000 resolve;
        keepalive 16;
    }

    server {
        listen 8080;
        server_name _;
        client_max_body_size 12m;
        client_body_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;

        location = /gateway-health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        location = /api/v1/events/stream {
            access_log off;
            # Query authentication is retained for v1.0. Suppress request-
            # bearing error logs for this exact location as well; runtime
            # smoke tests prove a marker never reaches container logs.
            error_log /dev/stderr crit;
            proxy_pass http://cronometrix_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 24h;
        }

        location /api/ {
            proxy_pass http://cronometrix_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
        }

        location / {
            proxy_pass http://cronometrix_web;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
