# Cronometrix v1 deployment — private, digest-pinned release topology.
# Browser traffic enters only through gateway:8080; api/web stay internal.
# Generated/copied by deploy/install.sh; lives at /opt/cronometrix/docker-compose.yml
# on each client server. .env file in the same directory provides secrets.

services:
  api:
    image: ${API_IMAGE:?API_IMAGE digest required}
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      - CRONOMETRIX_DB_PATH=/opt/cronometrix/data/cronometrix.db
      - LICENSE_JWT_PATH=/opt/cronometrix/data/license.jwt
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=3001
    expose:
      - "3001"
    volumes:
      - ./data:/opt/cronometrix/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3001/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  web:
    image: ${WEB_IMAGE:?WEB_IMAGE digest required}
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - INTERNAL_API_URL=http://api:3001
    expose:
      - "3000"
    depends_on:
      api:
        condition: service_healthy

  gateway:
    image: ${GATEWAY_IMAGE:?GATEWAY_IMAGE digest required}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/gateway-health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  cloudflared:
    image: ${CLOUDFLARED_IMAGE:?CLOUDFLARED_IMAGE digest required}
    restart: unless-stopped
    # The remotely managed public hostname must use http://gateway:8080 as
    # its service. `TUNNEL_TOKEN` connects to that pre-created tunnel.
    command: tunnel --no-autoupdate run
    environment:
      # `${VAR:?msg}` syntax: docker compose hard-fails if unset, surfacing
      # config errors at boot instead of silently running a broken tunnel
      # (RESEARCH § Pitfall 6).
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN:?CLOUDFLARE_TUNNEL_TOKEN required — re-run installer or edit .env}
    depends_on:
      gateway:
        condition: service_healthy
